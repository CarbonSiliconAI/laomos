<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent OS</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --taskbar-height: 48px;
            --window-border: 1px solid #30363d;
            --window-bg: #161b22;
            --header-bg: #21262d;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --selection-color: rgba(88, 166, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=2874&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Desktop Icons */
        #desktop {
            height: calc(100vh - var(--taskbar-height));
            width: 100%;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-content: flex-start;
        }

        .desktop-icon {
            width: 80px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }

        .desktop-icon:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .desktop-icon.selected {
            background-color: var(--selection-color);
            border: 1px solid var(--accent-color);
        }

        .icon-img {
            font-size: 40px;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .icon-label {
            font-size: 12px;
            text-align: center;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
        }

        /* Window System */
        .window {
            position: absolute;
            background-color: var(--window-bg);
            border: var(--window-border);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            min-width: 300px;
            min-height: 200px;
            overflow: hidden;
            animation: openWindow 0.2s ease-out;
            resize: both;
        }

        @keyframes openWindow {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .window-header {
            height: 32px;
            background-color: var(--header-bg);
            border-bottom: var(--window-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            cursor: default;
        }

        .window-title {
            font-size: 13px;
            font-weight: 600;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .close-btn {
            background-color: #ff5f56;
        }

        .min-btn {
            background-color: #ffbd2e;
        }

        .max-btn {
            background-color: #27c93f;
        }

        .window-body {
            flex-grow: 1;
            position: relative;
            overflow: auto;
            background-color: #1e1e1e;
        }

        .window.active {
            z-index: 100;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            border-color: #555;
        }

        /* Specific App Styles */
        /* File Explorer */
        .file-explorer-container {
            display: flex;
            height: 100%;
        }

        .fe-sidebar {
            width: 200px;
            background-color: #252526;
            border-right: 1px solid #3e3e42;
            overflow-y: auto;
        }

        .fe-content {
            flex-grow: 1;
            padding: 10px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            grid-auto-rows: 100px;
            gap: 10px;
            align-content: start;
        }

        .fe-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: 4px;
            cursor: pointer;
        }

        .fe-item:hover {
            background-color: #37373d;
        }

        .fe-icon {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .fe-name {
            font-size: 12px;
            text-align: center;
            word-break: break-word;
        }

        /* Graph */
        #graph-svg {
            width: 100%;
            height: 100%;
        }

        /* Taskbar */
        #taskbar {
            height: var(--taskbar-height);
            background-color: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 1000;
        }

        .taskbar-item {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .taskbar-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .taskbar-item.running::after {
            content: '';
            position: absolute;
            bottom: -4px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: var(--text-color);
        }

        .taskbar-icon {
            font-size: 24px;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: #333;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #555;
            font-size: 12px;
            display: none;
            pointer-events: none;
            z-index: 2000;
        }
    </style>
</head>

<body>

    <div id="desktop">
        <!-- Icons generated by JS -->
    </div>

    <div id="taskbar">
        <!-- Taskbar items generated by JS -->
    </div>

    <!-- Templates for Window Content -->

    <!-- File Explorer Template -->
    <template id="tpl-file-explorer">
        <div class="file-explorer-container">
            <div class="fe-sidebar" id="fe-sidebar"></div>
            <div class="fe-content" id="fe-main"></div>
        </div>
    </template>

    <!-- Graph Template -->
    <template id="tpl-graph">
        <div id="graph-container" style="width:100%; height:100%;"></div>
    </template>

    <!-- Editor Template -->
    <template id="tpl-editor">
        <textarea id="editor-textarea"
            style="width:100%; height:100%; background:#1e1e1e; color:#d4d4d4; border:none; padding:10px; resize:none; font-family:monospace; outline:none;"></textarea>
    </template>

    <!-- Chat Template -->
    <template id="tpl-chat">
        <div style="display:flex; flex-direction:column; height:100%; padding:0;">
            <!-- Chat View -->
            <div id="view-chat" style="display:flex; flex-direction:column; flex-grow:1; padding:10px;">
                <select id="chat-model-select"
                    style="padding:5px; margin-bottom:10px; background:#2d2d2d; color:white; border:1px solid #444;">
                    <option value="">Select Model...</option>
                </select>
                <div id="chat-messages"
                    style="flex-grow:1; overflow-y:auto; border:1px solid #444; padding:10px; margin-bottom:10px; background:#161b22;">
                </div>
                <div style="display:flex; gap:5px;">
                    <input id="chat-input" type="text" placeholder="Type a message..."
                        style="flex-grow:1; padding:5px; background:#2d2d2d; color:white; border:1px solid #444;">
                    <button id="chat-send" style="padding:5px 10px; cursor:pointer;">Send</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Model Manager Template -->
    <template id="tpl-model-manager">
        <div style="display:flex; flex-direction:column; height:100%; padding:10px; overflow-y:auto;">
            <div
                style="margin-bottom:20px; padding:10px; background:#161b22; border:1px solid #30363d; border-radius:6px;">
                <h3 style="margin-top:0; border-bottom:1px solid #30363d; padding-bottom:5px;">System Hardware</h3>
                <div id="sys-specs" style="font-size:13px; color:#c9d1d9;">Loading...</div>
            </div>

            <div
                style="margin-bottom:20px; padding:10px; background:#161b22; border:1px solid #30363d; border-radius:6px;">
                <h3 style="margin-top:0; border-bottom:1px solid #30363d; padding-bottom:5px;">Recommended Models</h3>
                <div id="rec-models" style="font-size:13px; color:#c9d1d9; margin-bottom:10px;">Loading...</div>
            </div>

            <div
                style="padding:10px; background:#161b22; border:1px solid #30363d; border-radius:6px; flex-grow:1; display:flex; flex-direction:column; overflow:hidden;">
                <h3 style="margin-top:0; border-bottom:1px solid #30363d; padding-bottom:5px;">Download Available Models
                </h3>
                <div id="download-list" style="flex-grow:1; overflow-y:auto; padding-right:5px; margin-bottom:10px;">
                    <!-- List items generated by JS -->
                    <div style="text-align:center; padding:20px; color:#8b949e;">Loading list...</div>
                </div>

                <!-- Custom Pull Section -->
                <div style="border-top:1px solid #30363d; padding-top:10px;">
                    <div style="font-size:12px; color:#8b949e; margin-bottom:5px;">Or pull a custom model by tag:</div>
                    <div style="display:flex; gap:5px;">
                        <input id="custom-pull-input" type="text" placeholder="e.g. qwen2.5, deepseek-coder"
                            style="flex-grow:1; padding:5px; background:#2d2d2d; color:white; border:1px solid #444; border-radius:3px;">
                        <button id="btn-custom-pull"
                            style="padding:5px 15px; cursor:pointer; background:#238636; color:white; border:none; border-radius:3px;">Pull</button>
                    </div>
                    <div id="custom-pull-status" style="font-size:12px; color:#8b949e; margin-top:5px;"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- Drawing App Template -->
    <template id="tpl-draw">
        <div style="display:flex; flex-direction:row; height:100%; background:#0d1117; color:#c9d1d9;">

            <!-- Left Side: Drawing Area -->
            <div
                style="flex:1; display:flex; flex-direction:column; border-right:1px solid #30363d; position:relative; overflow:hidden;">
                <div
                    style="padding:10px; background:#161b22; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; gap:5px;">
                        <button class="tool-btn active" data-tool="pen"
                            style="padding:5px 8px; font-size:12px; cursor:pointer;">✏️ Pen</button>
                        <button class="tool-btn" data-tool="eraser"
                            style="padding:5px 8px; font-size:12px; cursor:pointer;">🧹 Eraser</button>
                        <button class="tool-btn" data-tool="clear"
                            style="padding:5px 8px; font-size:12px; cursor:pointer; color:#da3633;">❌ Clear</button>
                    </div>
                    <div style="font-size:12px; color:#8b949e;">Canvas</div>
                </div>

                <div style="flex-grow:1; position:relative; overflow:hidden; background:#0d1117;">
                    <canvas id="draw-canvas" width="800" height="600"
                        style="background:#0d1117; cursor:crosshair;"></canvas>
                </div>

                <div style="padding:10px; background:#161b22; border-top:1px solid #30363d;">
                    <h4 style="margin:0 0 5px 0; font-size:12px;">AI Generation</h4>
                    <div style="display:flex; gap:5px; margin-bottom:5px;">
                        <select id="ai-provider"
                            style="padding:4px; font-size:12px; background:#21262d; color:white; border:1px solid #30363d;">
                            <option value="openai">OpenAI</option>
                            <option value="google">Google (Sim)</option>
                            <option value="mock">Mock (Free)</option>
                        </select>
                        <select id="ai-type"
                            style="padding:4px; font-size:12px; background:#21262d; color:white; border:1px solid #30363d;">
                            <option value="image">Image (DALL-E)</option>
                            <option value="graph">Graph (Mermaid)</option>
                        </select>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input id="ai-prompt" type="text" placeholder="Describe what to draw..."
                            style="flex-grow:1; padding:4px; font-size:12px; background:#0d1117; color:white; border:1px solid #30363d;">
                        <button id="btn-draw-gen"
                            style="padding:4px 8px; font-size:12px; cursor:pointer; background:#1f6feb; color:white; border:none; border-radius:3px;">Generate</button>
                    </div>
                    <div id="draw-status" style="font-size:11px; color:#c9d1d9; margin-top:3px;"></div>
                </div>

                <!-- Mermaid container -->
                <div id="mermaid-container"
                    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:#0d1117; z-index:10; padding:20px; overflow:auto;">
                    <button id="close-mermaid"
                        style="position:absolute; top:10px; right:10px; z-index:20; cursor:pointer; padding:5px 8px; background:#21262d; color:white; border:1px solid #30363d; border-radius:3px;">Close
                        View</button>
                    <div class="mermaid-target"></div>
                </div>
            </div>

            <!-- Right Side: Task Flow Visualization -->
            <div style="width:280px; background:#161b22; display:flex; flex-direction:column;">
                <div
                    style="padding:15px; border-bottom:1px solid #30363d; font-weight:bold; font-size:13px; color:#c9d1d9;">
                    AI Task Flow
                </div>
                <div id="draw-flow-container" style="flex:1; padding:15px; overflow-y:auto; position:relative;">
                    <div style="color:#6e7681; font-size:12px; text-align:center; margin-top:20px;">
                        Execution trace will appear here...
                    </div>
                </div>
            </div>

        </div>
    </template>

    <!-- Video App Template -->
    <template id="tpl-video">
        <div style="display:flex; flex-direction:row; height:100%; background:#000; color:#c9d1d9;">

            <!-- Left Side: Video Player Area -->
            <div style="flex:1; display:flex; flex-direction:column; border-right:1px solid #30363d;">
                <div
                    style="flex-grow:1; position:relative; overflow:hidden; background:#000; display:flex; justify-content:center; align-items:center;">
                    <video id="video-player" controls style="max-width:100%; max-height:100%;"></video>
                    <div id="video-placeholder"
                        style="color:#30363d; display:flex; flex-direction:column; align-items:center; gap:10px;">
                        <div style="font-size:48px;">🎬</div>
                        <div>Enter a prompt to generate video</div>
                    </div>
                </div>

                <div style="padding:10px; background:#161b22; border-top:1px solid #30363d;">
                    <h4 style="margin:0 0 5px 0; font-size:12px;">AI Video Generation</h4>
                    <div style="display:flex; gap:5px; margin-bottom:5px;">
                        <select id="video-provider"
                            style="padding:4px; font-size:12px; background:#21262d; color:white; border:1px solid #30363d;">
                            <option value="google">Google (Veo)</option>
                            <option value="openai">OpenAI (Sora)</option>
                            <option value="mock">Mock (Free)</option>
                        </select>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input id="video-prompt" type="text" placeholder="Describe the video..."
                            style="flex-grow:1; padding:4px; font-size:12px; background:#0d1117; color:white; border:1px solid #30363d;">
                        <button id="btn-video-gen"
                            style="padding:4px 8px; font-size:12px; cursor:pointer; background:#1f6feb; color:white; border:none; border-radius:3px;">Generate</button>
                    </div>
                    <div id="video-status" style="font-size:11px; color:#c9d1d9; margin-top:3px;"></div>
                </div>
            </div>

            <!-- Right Side: Task Flow Visualization -->
            <div style="width:280px; background:#161b22; display:flex; flex-direction:column;">
                <div
                    style="padding:15px; border-bottom:1px solid #30363d; font-weight:bold; font-size:13px; color:#c9d1d9;">
                    AI Task Flow
                </div>
                <div id="video-flow-container" style="flex:1; padding:15px; overflow-y:auto; position:relative;">
                    <div style="color:#6e7681; font-size:12px; text-align:center; margin-top:20px;">
                        Execution trace will appear here...
                    </div>
                </div>
            </div>

        </div>
    </template>

    <style>
        .tool-btn {
            background: #21262d;
            color: white;
            border: 1px solid #30363d;
            border-radius: 3px;
        }

        .tool-btn:hover {
            background: #30363d;
        }

        .tool-btn.active {
            background: #1f6feb;
            border-color: #1f6feb;
        }
    </style>

    <!-- AI Flow template -->
    <template id="tpl-flow">
        <div style="display:flex; height:100%; flex-direction:column; background:#0d1117; color:#c9d1d9;">
            <div
                style="display:flex; padding:10px; border-bottom:1px solid #30363d; background:#161b22; align-items:center; justify-content:space-between;">
                <div>
                    <h3 style="margin:0; font-size:14px; font-weight:600;">AI Flow Builder</h3>
                    <span style="font-size:12px; color:#8b949e;">Standard AI Agent Protocol Linker</span>
                </div>
                <button id="flow-run-btn"
                    style="padding:6px 12px; background:#238636; color:white; border:none; border-radius:4px; font-weight:600; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:5px;">
                    ▶ Run Graph
                </button>
            </div>

            <div style="display:flex; flex:1; overflow:hidden;">
                <!-- Left Palette -->
                <div
                    style="width:200px; border-right:1px solid #30363d; background:#161b22; display:flex; flex-direction:column;">
                    <div style="padding:10px; font-weight:600; border-bottom:1px solid #30363d; font-size:12px;">Tool
                        Palette</div>
                    <div id="flow-palette"
                        style="flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:10px;">
                        <!-- Draggable nodes will be injected here -->
                    </div>
                </div>

                <!-- Center Column: Canvas + Bottom Properties -->
                <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
                    <!-- Main Canvas -->
                    <div style="flex:1; position:relative; overflow:hidden; background:#0d1117;"
                        id="flow-canvas-container">
                        <svg id="flow-edges"
                            style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1;"></svg>
                        <div id="flow-canvas"
                            style="position:absolute; top:0; left:0; width:2000px; height:2000px; transform-origin: top left;">
                            <!-- Nodes dropped here -->
                        </div>
                    </div>

                    <!-- Bottom Properties Pane -->
                    <div id="flow-properties"
                        style="height:250px; border-top:1px solid #30363d; background:#161b22; display:flex; flex-direction:column; display:none;">
                        <div
                            style="padding:10px; font-weight:600; border-bottom:1px solid #30363d; font-size:12px; display:flex; justify-content:space-between; align-items:center;">
                            <span>Protocol Inspector</span>
                            <button id="flow-prop-close"
                                style="background:none; border:none; color:#c9d1d9; cursor:pointer;">✕</button>
                        </div>
                        <div
                            style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:row; flex-wrap:wrap; gap:20px;">
                            <input type="hidden" id="prop-node-id">

                            <!-- Col 1: Metdata -->
                            <div style="flex:1; min-width:200px; display:flex; flex-direction:column; gap:8px;">
                                <div style="display:flex; flex-direction:column; gap:4px;">
                                    <label style="font-size:11px; color:#8b949e; font-weight:600;">AGENT
                                        CATEGORY</label>
                                    <select id="prop-category"
                                        style="width:100%; padding:6px; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:4px; font-size:12px;">
                                        <option value="Conversational">Conversational</option>
                                        <option value="Generative">Generative</option>
                                        <option value="Vision">Vision</option>
                                        <option value="Planning">Planning</option>
                                        <option value="Tools">Tools</option>
                                        <option value="Search">Search</option>
                                    </select>
                                </div>
                                <div style="display:flex; flex-direction:column; gap:4px;">
                                    <label style="font-size:11px; color:#8b949e; font-weight:600;">VERTICAL
                                        DOMAIN</label>
                                    <input id="prop-domain" type="text"
                                        style="width:100%; padding:6px; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:4px; font-size:12px;"
                                        placeholder="e.g., General, Art, Coding">
                                </div>
                                <div style="display:flex; flex-direction:column; gap:4px;">
                                    <label style="font-size:11px; color:#8b949e; font-weight:600;">FUNCTIONALITY</label>
                                    <textarea id="prop-func"
                                        style="width:100%; height:40px; padding:6px; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:4px; font-size:12px; resize:vertical;"
                                        placeholder="Describe what this agent does..."></textarea>
                                </div>
                            </div>

                            <!-- Col 2: IO Format & Save -->
                            <div style="flex:1; min-width:200px; display:flex; flex-direction:column; gap:8px;">
                                <div style="display:flex; flex-direction:column; gap:4px;">
                                    <label style="font-size:11px; color:#8b949e; font-weight:600;">INPUT FORMAT</label>
                                    <input id="prop-in-format" type="text"
                                        style="width:100%; padding:6px; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:4px; font-size:12px;"
                                        placeholder="e.g., Text Prompt, Image URL">
                                </div>
                                <div style="display:flex; flex-direction:column; gap:4px;">
                                    <label style="font-size:11px; color:#8b949e; font-weight:600;">OUTPUT FORMAT</label>
                                    <input id="prop-out-format" type="text"
                                        style="width:100%; padding:6px; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:4px; font-size:12px;"
                                        placeholder="e.g., Markdown Text, PNG Buffer">
                                </div>
                                <button id="prop-save-btn"
                                    style="margin-top:auto; padding:8px; background:#238636; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:600; font-size:12px;">Save
                                    Protocol Status</button>
                            </div>

                            <!-- Col 3: Values -->
                            <div style="flex:2; min-width:300px; display:flex; flex-direction:column; gap:8px;">
                                <div style="display:flex; flex-direction:column; gap:4px; flex:1;">
                                    <label style="font-size:11px; color:#ffbd2e; font-weight:600;">MANUAL INPUT VALUE
                                        <span style="font-size:10px; color:#8b949e;">(Overrides incoming
                                            connections)</span></label>
                                    <textarea id="prop-input-value"

        // --- System State ---

        const apps = {

                id: 'search',

                type: 'app',

            },
            'settings': {
                id: 'settings',
                name: 'Settings',

                type: 'app',
            },
        };

        const defaultDesktopApps = ['computer', 'network', 'terminal', 'chat', 'model-manager', 'api-manager', 'draw', 'video', 'flow', 'store', 'search', 'settings'];

        const availableModels = [
            { id: 'llama3.1', name: 'Llama 3.1 (8B)', size: '4.7GB', desc: 'Meta\'s latest state-of-the-art model' },
            { id: 'llama3.1:70b', name: 'Llama 3.1 (70B)', size: '40GB', desc: 'Meta\'s powerful large model' },
            { id: 'qwen2.5:0.5b', name: 'Qwen 2.5 (0.5B)', size: '350MB', desc: 'Alibaba\'s latest nano model' },
            { id: 'qwen2.5:1.5b', name: 'Qwen 2.5 (1.5B)', size: '900MB', desc: 'Alibaba\'s latest micro model' },
            { id: 'qwen2.5:7b', name: 'Qwen 2.5 (7B)', size: '4.5GB', desc: 'Alibaba\'s strong 7B model' },
            { id: 'gemma2', name: 'Gemma 2 (9B)', size: '5.5GB', desc: 'Google\'s open model version 2' },
            { id: 'mistral-nemo', name: 'Mistral Nemo', size: '7.1GB', desc: 'Mistral\'s 12B model' },
            { id: 'phi3.5', name: 'Phi-3.5', size: '2.4GB', desc: 'Microsoft\'s latest small model' },
            { id: 'deepseek-coder-v2', name: 'DeepSeek Coder V2', size: '8.9GB', desc: 'Top-tier coding model' },
            { id: 'llama3:8b', name: 'Llama 3 (8B)', size: '4.7GB', desc: 'Meta\'s previous open LLM' },
        ];

        // --- Desktop & Taskbar ---
        function initDesktop() {
            const desktop = document.getElementById('desktop');
            const taskbar = document.getElementById('taskbar');

            // Sort apps alphabetically by name
            const sortedApps = Object.values(apps).sort((a, b) => a.name.localeCompare(b.name));

            // Render Desktop Icons
            sortedApps.forEach(app => {
                const icon = document.createElement('div');
                icon.className = 'desktop-icon';
                icon.innerHTML = `
                    <div class="icon-img">${app.icon}</div>
                    <div class="icon-label">${app.name}</div>
                `;
                icon.onclick = () => app.action();
                desktop.appendChild(icon);
            });

            // Render Taskbar (Dock style)
            renderTaskbar();
        }

        function renderTaskbar() {
            const taskbar = document.getElementById('taskbar');
            taskbar.innerHTML = '';

            const sortedApps = Object.values(apps).sort((a, b) => a.name.localeCompare(b.name));

            sortedApps.forEach(app => {
                const item = document.createElement('div');
                item.className = 'taskbar-item';
                // Mark running if any window of this type is open (simplified)
                const isRunning = windows.some(w => w.appId === app.id);
                if (isRunning) item.classList.add('running');

                item.innerHTML = `<div class="taskbar-icon">${app.icon}</div>`;
                item.onclick = () => app.action();

                // Tooltip
                item.title = app.name;

                taskbar.appendChild(item);
            });
        }

        // --- Window Manager ---
        function createWindow(title, appId, width = 600, height = 400) {
            const id = 'win-' + Date.now();
            const win = document.createElement('div');
            win.className = 'window active';
            win.id = id;
            win.style.width = width + 'px';
            win.style.height = height + 'px';
            win.style.left = (50 + windows.length * 20) + 'px';
            win.style.top = (50 + windows.length * 20) + 'px';
            win.style.zIndex = ++highestZ;

            win.innerHTML = `
                <div class="window-header" onmousedown="startDrag(event, '${id}')">
                    <div class="window-title">${title}</div>
                    <div class="window-controls">
                        <button class="control-btn close-btn" onclick="closeWindow('${id}')"></button>
                        <button class="control-btn min-btn"></button>
                        <button class="control-btn max-btn"></button>
                    </div>
                </div>
                <div class="window-body" id="${id}-body"></div>
            `;

            // Focus management
            win.onmousedown = () => focusWindow(id);

            document.body.appendChild(win);

            const winObj = { id, appId, element: win };
            windows.push(winObj);
            focusWindow(id);
            renderTaskbar();

            return document.getElementById(`${id}-body`);
        }

        function closeWindow(id) {
            const win = document.getElementById(id);
            if (win) {
                win.remove();
                windows = windows.filter(w => w.id !== id);
                renderTaskbar();
            }
        }

        function focusWindow(id) {
            activeWindow = id;
            const win = document.getElementById(id);
            if (win) {
                win.style.zIndex = ++highestZ;
                // Remove active class from all
                document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
                win.classList.add('active');
            }
        }

        // --- Dragging Logic ---
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };
        let draggedWin = null;

        function startDrag(e, id) {
            if (e.target.closest('.window-controls')) return; // Don't drag if clicking buttons
            isDragging = true;
            draggedWin = document.getElementById(id);
            const rect = draggedWin.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            focusWindow(id);
        }

        window.onmousemove = (e) => {
            if (isDragging && draggedWin) {
                draggedWin.style.left = (e.clientX - dragOffset.x) + 'px';
                draggedWin.style.top = (e.clientY - dragOffset.y) + 'px';
            }
        }

        window.onmouseup = () => {
            isDragging = false;
            draggedWin = null;
        }

        // --- App: File Explorer ---
        async function openFileExplorer(path = '') {
            const body = createWindow('File Explorer', 'computer', 700, 500);
            body.innerHTML = document.getElementById('tpl-file-explorer').innerHTML;

            // Re-bind IDs dynamically to avoid conflict if multiple windows? 
            // For simplicity, we'll scope selectors to 'body'

            const sidebar = body.querySelector('.fe-sidebar');
            const main = body.querySelector('.fe-content');

            await loadFiles(path, main, sidebar, body);
        }

        async function loadFiles(dirPath, container, sidebar, winBody) {
            try {
                const response = await fetch(`/api/files/list?path=${encodeURIComponent(dirPath)}`);
                const data = await response.json();

                if (!response.ok) throw new Error(data.error);

                container.innerHTML = '';

                // Back Button (if valid)
                const current = data.path.replace(/\/$/, '');
                const root = data.root.replace(/\/$/, '');

                if (current.startsWith(root) && current !== root) {
                    const backItem = document.createElement('div');
                    backItem.className = 'fe-item';
                    backItem.innerHTML = `<div class="fe-icon">↩️</div><div class="fe-name">Back</div>`;
                    backItem.onclick = () => {
                        const parent = current.substring(0, current.lastIndexOf('/'));
                        loadFiles(parent, container, sidebar, winBody);
                    };
                    container.appendChild(backItem);
                }

                data.files.forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'fe-item';
                    const icon = file.isDirectory ? '📁' : '📄';
                    item.innerHTML = `<div class="fe-icon">${icon}</div><div class="fe-name">${file.name}</div>`;

                    item.onclick = async () => {
                        if (file.isDirectory) {
                            loadFiles(file.path, container, sidebar, winBody);
                        } else {
                            // Open file
                            const res = await fetch(`/api/files/read?path=${encodeURIComponent(file.path)}`);
                            const fdata = await res.json();
                            openEditor(file.name, fdata.content);
                        }
                    };
                    container.appendChild(item);
                });

            } catch (e) {
                container.innerHTML = `<div style="padding:20px; color:red;">Error: ${e.message}</div>`;
            }
        }

        function openEditor(filename, content) {
            const body = createWindow(filename, 'computer', 500, 400); // Use same app ID to group
            body.innerHTML = document.getElementById('tpl-editor').innerHTML;
            const textarea = body.querySelector('#editor-textarea');
            textarea.value = content;
        }

        // --- App: Ollama Chat ---
        async function openChat() {
            const body = createWindow('Ollama Chat', 'chat', 500, 650);
            body.innerHTML = document.getElementById('tpl-chat').innerHTML;

            const modelSelect = body.querySelector('#chat-model-select');
            const messagesDiv = body.querySelector('#chat-messages');
            const input = body.querySelector('#chat-input');
            const sendBtn = body.querySelector('#chat-send');

            // Load models
            const loadModels = async () => {
                try {
                    modelSelect.innerHTML = '<option value="">Select Model...</option>';
                    const res = await fetch('/api/ollama/models');
                    const data = await res.json();
                    if (data.models) {
                        data.models.forEach(model => {
                            const option = document.createElement('option');
                            option.value = model;
                            option.text = model;
                            modelSelect.appendChild(option);
                        });
                    }
                } catch (e) {
                    console.error("Failed to load models", e);
                }
            };
            loadModels();

            // Send Logic
            const sendMessage = async () => {
                const text = input.value.trim();
                if (!text) return;

                // User Message
                appendMessage(messagesDiv, 'User', text);
                input.value = '';

                // Bot Response
                const model = modelSelect.value;
                if (!model) {
                    appendMessage(messagesDiv, 'System', 'Please select a model.');
                    return;
                }

                try {
                    const res = await fetch('/api/ollama/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: model,
                            messages: [{ role: 'user', content: text }]
                        })
                    });
                    const data = await res.json();

                    if (data.message && data.message.content) {
                        appendMessage(messagesDiv, 'AI', data.message.content);
                    } else if (data.error) {
                        appendMessage(messagesDiv, 'System', 'Error: ' + data.error);
                    } else {
                        appendMessage(messagesDiv, 'System', 'Error: No response.');
                    }
                } catch (e) {
                    appendMessage(messagesDiv, 'System', 'Error: ' + e.message);
                }
            };

            sendBtn.onclick = sendMessage;
            input.onkeypress = (e) => {
                if (e.key === 'Enter') sendMessage();
            };
        }

        // --- App: Model Manager ---
        async function openModelManager() {
            const body = createWindow('Model Manager', 'model-manager', 500, 600);
            body.innerHTML = document.getElementById('tpl-model-manager').innerHTML;

            const sysSpecsDiv = body.querySelector('#sys-specs');
            const recModelsDiv = body.querySelector('#rec-models');
            const downloadList = body.querySelector('#download-list');

            const customInput = body.querySelector('#custom-pull-input');
            const customBtn = body.querySelector('#btn-custom-pull');
            const customStatus = body.querySelector('#custom-pull-status');

            // Fetch Specs immediately
            try {
                const res = await fetch('/api/system/specs');
                const specs = await res.json();
                sysSpecsDiv.innerHTML = `
                    <strong>Platform:</strong> ${specs.platform}<br>
                    <strong>CPU:</strong> ${specs.cpuModel} (${specs.cpuCores} cores)<br>
                    <strong>RAM:</strong> ${specs.freeMem} free / ${specs.totalMem} total
                `;

                recModelsDiv.innerHTML = 'Based on your hardware, we recommend models from the list below marked with <span style="background:#1f6feb; color:white; padding:1px 4px; border-radius:3px; font-size:10px;">Recommended</span>';

                renderDownloadList(specs.recommendedModels);
            } catch (e) {
                sysSpecsDiv.textContent = 'Error loading specs.';
                renderDownloadList([]);
            }

            function renderDownloadList(recommended) {
                downloadList.innerHTML = '';

                // Sort: Recommended first, then others
                const sorted = [...availableModels].sort((a, b) => {
                    const aRec = recommended.some(r => a.id.includes(r) || r.includes(a.id));
                    const bRec = recommended.some(r => b.id.includes(r) || r.includes(b.id));
                    return bRec - aRec;
                });

                sorted.forEach(m => {
                    const isRec = recommended.some(r => m.id.includes(r) || r.includes(m.id));
                    const item = document.createElement('div');
                    item.style.cssText = 'padding:10px; margin-bottom:5px; background:#21262d; border:1px solid #30363d; border-radius:4px; display:flex; justify-content:space-between; align-items:center;';

                    item.innerHTML = `
                        <div style="flex-grow:1;">
                            <div style="font-weight:600; font-size:13px; color:white;">
                                ${m.name} <span style="font-weight:normal; color:#8b949e; font-size:11px;">(${m.size})</span>
                                ${isRec ? '<span style="background:#1f6feb; color:white; padding:1px 4px; border-radius:3px; font-size:10px; margin-left:5px;">Recommended</span>' : ''}
                            </div>
                            <div style="font-size:11px; color:#8b949e;">${m.desc}</div>
                        </div>
                        <button class="pull-btn" style="padding:4px 10px; cursor:pointer; background:#238636; color:white; border:none; border-radius:3px; font-size:12px;">Pull</button>
                    `;

                    const btn = item.querySelector('.pull-btn');
                    btn.onclick = async () => {
                        const originalText = btn.textContent;
                        btn.textContent = 'Pulling...';
                        btn.disabled = true;
                        btn.style.background = '#8b949e';

        async function initD3Graph(container) {
            const width = container.clientWidth;
            const height = container.clientHeight;

            // Fetch data
            let data = { nodes: [], edges: [] };
            try {
                const res = await fetch('/api/graph');
                data = await res.json();
            } catch (e) { console.error(e); }

            const svg = d3.select(container).append("svg")
                .attr("width", "100%")
                .attr("height", "100%")
                .call(d3.zoom().on("zoom", (event) => {
                    g.attr("transform", event.transform);
                }));

            const g = svg.append("g");

            const simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.edges).id(d => d.id).distance(100))
                .force("charge", d3.forceManyBody().strength(-300))
                .force("center", d3.forceCenter(width / 2, height / 2));

            const link = g.append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(data.edges)
                .enter().append("line")
                .attr("class", "link")
                .style("stroke", "#999").style("stroke-opacity", "0.6");

            const node = g.append("g")
                .attr("class", "nodes")
                .selectAll("g")
                .data(data.nodes)
                .enter().append("g")
                .call(d3.drag()
                    .on("start", (event, d) => {
                        if (!event.active) simulation.alphaTarget(0.3).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
                    .on("end", (event, d) => {
                        if (!event.active) simulation.alphaTarget(0);
                        d.fx = null; d.fy = null;
                    }));

            const colorScale = d3.scaleOrdinal(d3.schemeCategory10);

            node.append("circle")
                .attr("r", 15)
                .attr("fill", d => colorScale(d.type))
                .style("stroke", "#fff").style("stroke-width", "1.5px").style("cursor", "pointer");

            node.append("text")
                .attr("dx", 18)
                .attr("dy", 4)
                .text(d => d.label)
                .style("fill", "#ddd").style("font-size", "12px").style("pointer-events", "none");

            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node
                    .attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }

        // --- App: Drawing App ---
        async function openDrawApp() {
            // Include mermaid.js dynamically if not present
            if (!document.querySelector('#mermaid-script')) {
                const script = document.createElement('script');
                script.id = 'mermaid-script';
                script.src = 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js';
                document.head.appendChild(script);
            }

            const body = createWindow('AI Drawing', 'draw', 600, 500);
            body.innerHTML = document.getElementById('tpl-draw').innerHTML;

            const canvas = body.querySelector('#draw-canvas');
            const ctx = canvas.getContext('2d');
            const tools = body.querySelectorAll('.tool-btn');
            const promptInput = body.querySelector('#ai-prompt');
            const generateBtn = body.querySelector('#btn-draw-gen');
            const statusDiv = body.querySelector('#draw-status');
            const providerSelect = body.querySelector('#ai-provider');
            const typeSelect = body.querySelector('#ai-type');

            // Mermaid UI
            const mermaidContainer = body.querySelector('#mermaid-container');
            const mermaidTarget = body.querySelector('.mermaid-target');
            body.querySelector('#close-mermaid').onclick = () => mermaidContainer.style.display = 'none';

            // Resize canvas to fit window-ish (simplified)
            // In a real app we'd handle resize events

            // Drawing State
            let painting = false;
            let tool = 'pen';
            let color = 'white';
            let lineWidth = 2;

            function startPosition(e) {
                painting = true;
                draw(e);
            }

            function finishedPosition() {
                painting = false;
                ctx.beginPath();
            }

            function draw(e) {
                if (!painting) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                ctx.lineWidth = lineWidth;
                ctx.lineCap = 'round';
                ctx.strokeStyle = tool === 'eraser' ? '#0d1117' : color;

                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            }

            canvas.addEventListener('mousedown', startPosition);
            canvas.addEventListener('mouseup', finishedPosition);
            canvas.addEventListener('mousemove', draw);

            // Tool Logic
            tools.forEach(btn => {
                btn.onclick = () => {
                    const t = btn.dataset.tool;
                    if (t === 'clear') {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    } else {
                        tool = t;
                        tools.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        if (tool === 'pen') lineWidth = 2;
                        if (tool === 'eraser') lineWidth = 10;
                    }
                };
            });

            // AI Generation Logic
            generateBtn.onclick = async () => {
                const prompt = promptInput.value.trim();
                const provider = providerSelect.value;
                const type = typeSelect.value;

                if (!prompt) return;

                generateBtn.disabled = true;
                generateBtn.textContent = 'Generating...';
                statusDiv.textContent = 'Contacting AI Service...';

                const flowContainer = body.querySelector('#draw-flow-container');
                flowContainer.innerHTML = '';
                let currentNodeCount = 0;

                try {
                    let endpoint = type === 'graph' ? '/api/ai/generate-graph' : '/api/ai/generate-image';
                    const url = `${endpoint}?provider=${encodeURIComponent(provider)}&prompt=${encodeURIComponent(prompt)}`;

                    const eventSource = new EventSource(url);

                    eventSource.addEventListener('trace', (e) => {
                        const event = JSON.parse(e.data);

                        const existingNode = flowContainer.querySelector(`[data-step="${event.step.replace(/\\s/g, '-')}"]`);

                        let node = existingNode;
                        if (!node) {
                            if (currentNodeCount === 0) flowContainer.innerHTML = '';
                            else {
                                const connector = document.createElement('div');
                                connector.style.cssText = 'width:2px; height:20px; background:#30363d; margin-left:14px;';
                                flowContainer.appendChild(connector);
                            }

                            node = document.createElement('div');
                            node.dataset.step = event.step.replace(/\\s/g, '-');
                            node.style.cssText = `
                                background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px;
                                font-size: 12px; position:relative;
                            `;
                            flowContainer.appendChild(node);
                        }

                        let dotColor = '#8b949e';
                        let statusLabel = 'Pending';
                        if (event.status === 'running') { dotColor = '#ffbd2e'; statusLabel = 'Running...'; }
                        else if (event.status === 'completed') { dotColor = '#238636'; statusLabel = 'Done'; }
                        else if (event.status === 'error') { dotColor = '#f85149'; statusLabel = 'Error'; }

                        let durationSpan = '';
                        if (event.durationMs !== undefined) {
                            durationSpan = `<span style="color:#6e7681; font-size:10px; margin-left:8px;">${(event.durationMs / 1000).toFixed(2)}s</span>`;
                        }

                        node.innerHTML = `
                            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:5px;">
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <div style="width:8px; height:8px; border-radius:50%; background:${dotColor};"></div>
                                    <strong style="color:#c9d1d9;">${event.step}</strong>
                                    ${durationSpan}
                                </div>
                                <span style="color:${dotColor}; font-size:10px;">${statusLabel}</span>
                            </div>
                            <div style="color:#8b949e; line-height:1.4; white-space:pre-wrap; font-family:monospace; margin-top:5px; background:#161b22; padding:5px; border-radius:4px;">${event.details || ''}</div>
                        `;

                        flowContainer.scrollTop = flowContainer.scrollHeight;
                        if (!existingNode) currentNodeCount++;
                    });

                    eventSource.addEventListener('result', (e) => {
                        const data = JSON.parse(e.data);

                        if (type === 'image') {
                            const img = new Image();
                            img.onload = () => {
                                ctx.drawImage(img, 0, 0, 800, 600);
                                statusDiv.textContent = 'Image generated!';
                            };
                            img.src = data.url;
                        } else {
                            mermaidContainer.style.display = 'block';
                            mermaidTarget.innerHTML = `<pre class="mermaid">${data.code}</pre>`;
                            try {
                                if (window.mermaid) {
                                    window.mermaid.init(undefined, mermaidTarget.querySelectorAll('.mermaid'));
                                    statusDiv.textContent = 'Graph generated!';
                                } else {
                                    statusDiv.textContent = 'Mermaid lib loading... try again.';
                                }
                            } catch (err) {
                                statusDiv.textContent = 'Mermaid render error';
                                console.error(err);
                            }
                        }

                        eventSource.close();
                        generateBtn.disabled = false;
                        generateBtn.textContent = 'Generate';
                    });

                    eventSource.addEventListener('error', (e) => {
                        if (e.data) {
                            try {
                                const err = JSON.parse(e.data);
                                statusDiv.innerHTML = `<span style="color:#ff5f56">Error: ${err.message}</span>`;

                                statusDiv.innerHTML = `<span style="color:#ff5f56">Stream Error</span>`;

                        }
                        eventSource.close();
                        generateBtn.disabled = false;
                        generateBtn.textContent = 'Generate';

                } catch (e) {
                    statusDiv.innerHTML = `<span style="color:#ff5f56">Error: ${e.message}</span>`;
                    generateBtn.disabled = false;
                    generateBtn.textContent = 'Generate';
                }
            };
        }
