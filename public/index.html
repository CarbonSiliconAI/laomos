        // ── Append-only Execution Journal (IndexedDB) ─────────────────────────
        // ExecutionRecord shape stored in IDB:
        // { run_id, flow_id, flow_version, triggered_by, goal_id,
        //   steps: ExecutionEvent[], total_cost_usd, total_latency_ms,
        //   outcome, snapshot: { nodes, edges }, timestamp }

        const _IDB_NAME = 'aos-journal';
        const _IDB_VER  = 2;

        function _openJournalDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(_IDB_NAME, _IDB_VER);
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('runs')) {
                        const store = db.createObjectStore('runs', { keyPath: 'run_id' });
                        store.createIndex('by_timestamp', 'timestamp', { unique: false });
                        store.createIndex('by_flow_id',   'flow_id',   { unique: false });
                    }
                    // Phase 2: goals store (only create if upgrading from < v2)
                    if (e.oldVersion < 2 && !db.objectStoreNames.contains('goals')) {
                        const gs = db.createObjectStore('goals', { keyPath: 'goal_id' });
                        gs.createIndex('by_created_at', 'created_at', { unique: false });
                    }
                };
                req.onsuccess = e => resolve(e.target.result);
                req.onerror   = e => reject(e.target.error);
            });
        }

        async function goalSave(goal) {
            const db = await _openJournalDB();
            return new Promise((resolve, reject) => {
                const req = db.transaction('goals', 'readwrite').objectStore('goals').put(goal);
                req.onsuccess = () => resolve(req.result);
                req.onerror   = () => reject(req.error);
            });
        }

        async function goalList() {
            const db = await _openJournalDB();
            return new Promise((resolve, reject) => {
                const goals = [];
                const req   = db.transaction('goals', 'readonly')
                                .objectStore('goals')
                                .index('by_created_at')
                                .openCursor(null, 'prev');
                req.onsuccess = e => {
                    const cursor = e.target.result;
                    if (cursor) { goals.push(cursor.value); cursor.continue(); }
                    else resolve(goals);
                };
                req.onerror = () => reject(req.error);
            });
        }

        async function goalGet(goalId) {
            const db = await _openJournalDB();
            return new Promise((resolve, reject) => {
                const req = db.transaction('goals', 'readonly').objectStore('goals').get(goalId);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror   = () => reject(req.error);
            });
        }

        // Append-only: IDBObjectStore.add() throws ConstraintError on duplicate key
        async function journalAppend(record) {
            try {
                const db = await _openJournalDB();
                await new Promise((resolve, reject) => {
                    const req = db.transaction('runs', 'readwrite').objectStore('runs').add(record);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror   = () => reject(req.error);
                });
                console.log(`[Journal] Appended run ${record.run_id}`);
            } catch (e) {
                if (e.name === 'ConstraintError') {
                    console.warn('[Journal] Duplicate run_id, skipping:', record.run_id);
                } else {
                    console.error('[Journal] Append failed:', e);
                }
            }
        }

        async function journalListRuns(limit = 200) {
            const db   = await _openJournalDB();
            return new Promise((resolve, reject) => {
                const runs = [];
                const req  = db.transaction('runs', 'readonly')
                               .objectStore('runs')
                               .index('by_timestamp')
                               .openCursor(null, 'prev');  // newest first
                req.onsuccess = e => {
                    const cursor = e.target.result;
                    if (cursor && runs.length < limit) { runs.push(cursor.value); cursor.continue(); }
                    else resolve(runs);
                };
                req.onerror = () => reject(req.error);
            });
        }

        async function journalGetRun(runId) {
            const db = await _openJournalDB();
            return new Promise((resolve, reject) => {
                const req = db.transaction('runs', 'readonly').objectStore('runs').get(runId);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror   = () => reject(req.error);
            });

        let activeGoal = null;  // Goal | null

        // ── Client-side outcome scorer (mirrors evaluator.ts) ─────────────────
        function mulberry32(seed) {
            return function() {
                seed |= 0; seed = seed + 0x6D2B79F5 | 0;
                let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        function computeOutcomeScoreClient(record, goal) {
            const scoresByDimension = {};
            const failReasons = [];
            let weightedSum = 0, totalWeight = 0;

            for (const criteria of goal.success_criteria) {
                let score = 0;
                switch (criteria.dimension) {
                    case 'task_completion':
                        score = record.outcome === 'completed' ? 1.0 : 0.0;
                        break;
                    case 'cost_efficiency':
                        score = Math.max(0, Math.min(1, 1 - (record.total_cost_usd || 0) / criteria.target));
                        break;
                    case 'latency':
                        score = Math.max(0, Math.min(1, 1 - (record.total_latency_ms || 0) / criteria.target));
                        break;
                    case 'output_quality':
                        if (criteria.evaluator === 'mock_llm_judge') {
                            const seed = parseInt((record.run_id || '').replace(/-/g, '').slice(0, 8), 16) || 42;
                            const rng = mulberry32(seed);
                            score = (seed % 30 + 70) / 100;
                        } else {
                            score = record.outcome === 'completed' ? 0.8 : 0.2;
                        }
                        break;
                    default:
                        score = 0;
                }
                scoresByDimension[criteria.dimension] = score;
                weightedSum += score * criteria.weight;
                totalWeight += criteria.weight;
                if (score < criteria.floor) {
                    failReasons.push(`${criteria.dimension} score ${score.toFixed(2)} below floor ${criteria.floor}`);
                }
            }

            const finalScore = totalWeight > 0 ? (weightedSum / totalWeight) * 100 : 0;
            return {
                run_id: record.run_id,
                goal_id: goal.goal_id,
                scoresByDimension,
                finalScore,
                passed: failReasons.length === 0,
                failReasons,
            };
        }

        function _flowFingerprint(nodes) {
            // Stable fingerprint: sorted node id:type pairs
            let h = 0;
            const s = JSON.stringify(nodes.map(n => n.id + ':' + n.type).sort());
            for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
            return (h >>> 0).toString(16).padStart(8, '0');
        }

        // --- Execution History App ---
        function openHistoryApp() {
            const body = createWindow('Run Journal', 'history', 940, 600);
            body.innerHTML = document.getElementById('tpl-history').innerHTML;

            const diffBtn = body.querySelector('#hist-diff-btn');
            let selectedRunIds = [];

            function updateDiffBtn() {
                diffBtn.textContent = `Diff Selected (${selectedRunIds.length})`;
                diffBtn.disabled = selectedRunIds.length !== 2;
                diffBtn.style.background = selectedRunIds.length === 2 ? '#1D1D1F' : 'rgba(0,0,0,0.06)';
                diffBtn.style.color = selectedRunIds.length === 2 ? '#FFFFFF' : '#1D1D1F';
            }

            function fmtCost(v) {
                if (!v || v === 0) return '$0.00';
                if (v < 0.001) return `$${(v * 1000).toFixed(4)}m`;
                return `$${v.toFixed(4)}`;
            }
            function fmtMs(v) {
                if (!v) return '—';
                return v >= 1000 ? `${(v / 1000).toFixed(1)}s` : `${Math.round(v)}ms`;
            }
            function fmtDate(ts) {
                if (!ts) return '—';
                return new Date(ts).toLocaleString();
            }
            function statusBadge(status) {
                const colors = { completed: '#34C759', failed: '#FF3B30', running: '#F59E0B' };
                const c = colors[status] || '#888';
                return `<span style="display:inline-block;padding:2px 7px;background:${c}22;color:${c};border-radius:4px;font-size:11px;font-weight:600;">${status}</span>`;
            }

            // ── Data source: IndexedDB journal ─────────────────────────────

            async function loadStats() {
                try {
                    const runs = await journalListRuns();
                    const totalCost    = runs.reduce((s, r) => s + (r.total_cost_usd  || 0), 0);
                    const totalLatency = runs.reduce((s, r) => s + (r.total_latency_ms || 0), 0);
                    const avgLatency   = runs.length ? totalLatency / runs.length : 0;
                    const scoredRuns   = runs.filter(r => r.outcome_score);
                    const passedRuns   = scoredRuns.filter(r => r.outcome_score?.passed);
                    const passRate     = scoredRuns.length ? Math.round(passedRuns.length / scoredRuns.length * 100) : null;

                    let cacheHitRate = null;
                    try {

            // ── Diff computation (pure IndexedDB, no backend) ───────────────

            function computeDiffLocal(a, b) {
                // flow_diff: nodes added / removed
                const aNodeIds = new Set((a.snapshot?.nodes || []).map(n => n.id));
                const bNodeIds = new Set((b.snapshot?.nodes || []).map(n => n.id));
                const addedNodes   = [...bNodeIds].filter(id => !aNodeIds.has(id));
                const removedNodes = [...aNodeIds].filter(id => !bNodeIds.has(id));
                const commonNodes  = [...aNodeIds].filter(id => bNodeIds.has(id));

                // param_diff: compare node properties for shared nodes
                const aNodes = new Map((a.snapshot?.nodes || []).map(n => [n.id, n]));
                const bNodes = new Map((b.snapshot?.nodes || []).map(n => [n.id, n]));
                const compareProps = ['type', 'manualInput', 'label', 'cat', 'domain'];
                const paramDiff = [];
                for (const nodeId of commonNodes) {
                    const na = aNodes.get(nodeId);
                    const nb = bNodes.get(nodeId);
                    for (const prop of compareProps) {
                        if (na[prop] !== nb[prop]) {
                            paramDiff.push({ node_id: nodeId, field: prop, value_a: na[prop], value_b: nb[prop] });
                        }
                    }
                }

                // divergence_point: first node (by execution order) where output_hash differs
                const aSteps = new Map((a.steps || []).map(ev => [ev.node_id, ev]));
                const bSteps = new Map((b.steps || []).map(ev => [ev.node_id, ev]));
                const orderedByA = [...(a.steps || [])].sort((x, y) => x.timestamp - y.timestamp).map(ev => ev.node_id);
                const orderedByB = [...(b.steps || [])].sort((x, y) => x.timestamp - y.timestamp).map(ev => ev.node_id);
                const order = [...orderedByA, ...orderedByB.filter(id => !orderedByA.includes(id))];
                let divergencePoint = null;
                for (const nodeId of order) {
                    const ea = aSteps.get(nodeId);
                    const eb = bSteps.get(nodeId);
                    if (ea && eb && ea.output_hash && eb.output_hash && ea.output_hash !== eb.output_hash) {
                        divergencePoint = nodeId;
                        break;
                    }
                }

                return {
                    cost_delta:       b.total_cost_usd   - a.total_cost_usd,
                    latency_delta:    b.total_latency_ms  - a.total_latency_ms,
                    added_nodes:      addedNodes,
                    removed_nodes:    removedNodes,
                    param_diff:       paramDiff,
                    divergence_point: divergencePoint,
                };
            }

            async function showDiff(runIdA, runIdB) {
                const detail = body.querySelector('#hist-detail');
                detail.innerHTML = '<div style="color:rgba(0,0,0,0.4);font-size:12px;">Computing diff…</div>';
                try {
                    const [a, b] = await Promise.all([journalGetRun(runIdA), journalGetRun(runIdB)]);
                    if (!a || !b) { detail.innerHTML = '<div style="color:#FF3B30;font-size:12px;">Could not load both runs.</div>'; return; }
                    const diff = computeDiffLocal(a, b);

                    const deltaSign = v => v > 0 ? '+' : '';
                    const costColor = diff.cost_delta    <= 0 ? '#34C759' : '#FF3B30';
                    const latColor  = diff.latency_delta <= 0 ? '#34C759' : '#FF3B30';

                    const paramDiffHTML = diff.param_diff.length === 0
                        ? '<div style="font-size:12px;color:rgba(0,0,0,0.4);padding:8px 0;">No parameter changes between these runs.</div>'
                        : `<table style="width:100%;border-collapse:collapse;font-size:11px;">
                            <thead><tr style="background:#F5F5F7;color:rgba(0,0,0,0.5);">
                                <th style="padding:5px 8px;text-align:left;font-weight:500;">Node</th>
                                <th style="padding:5px 8px;text-align:left;font-weight:500;">Field</th>
                                <th style="padding:5px 8px;text-align:left;font-weight:500;">Run A</th>
                                <th style="padding:5px 8px;text-align:left;font-weight:500;">Run B</th>
                            </tr></thead>
                            <tbody>${diff.param_diff.map((d, i) => `
                                <tr style="border-bottom:1px solid rgba(0,0,0,0.05);background:${i%2===0?'#FFFFFF':'#FAFAFA'}">
                                    <td style="padding:4px 8px;font-family:monospace;font-size:10px;color:#1D1D1F;">${d.node_id}</td>
                                    <td style="padding:4px 8px;color:rgba(0,0,0,0.6);">${d.field}</td>
                                    <td style="padding:4px 8px;color:#FF3B30;font-style:italic;">${d.value_a ?? '—'}</td>
                                    <td style="padding:4px 8px;color:#34C759;">${d.value_b ?? '—'}</td>
                                </tr>`).join('')}
                            </tbody>
                           </table>`;

                    const flowDiffHTML = (diff.added_nodes.length + diff.removed_nodes.length === 0)
                        ? '<div style="font-size:12px;color:rgba(0,0,0,0.4);padding:8px 0;">Same topology — no nodes added or removed.</div>'
                        : `<div style="display:flex;gap:20px;flex-wrap:wrap;">
                            ${diff.added_nodes.length ? `<div>
                                <div style="font-size:11px;color:rgba(0,0,0,0.4);margin-bottom:4px;">Added in Run B (${diff.added_nodes.length})</div>
                                ${diff.added_nodes.map(id => `<div style="font-size:11px;padding:3px 8px;background:#34C75922;color:#34C759;border-radius:4px;margin-bottom:3px;font-family:monospace;">${id}</div>`).join('')}
                            </div>` : ''}
                            ${diff.removed_nodes.length ? `<div>
                                <div style="font-size:11px;color:rgba(0,0,0,0.4);margin-bottom:4px;">Removed from Run A (${diff.removed_nodes.length})</div>
                                ${diff.removed_nodes.map(id => `<div style="font-size:11px;padding:3px 8px;background:#FF3B3022;color:#FF3B30;border-radius:4px;margin-bottom:3px;font-family:monospace;">${id}</div>`).join('')}
                            </div>` : ''}
                          </div>`;

                    const divergenceHTML = diff.divergence_point
                        ? `<div style="padding:10px 12px;background:#F59E0B18;border:1px solid #F59E0B44;border-radius:6px;font-size:12px;">
                               <span style="font-weight:600;color:#F59E0B;">Divergence at: </span>
                               <code style="font-size:11px;color:#1D1D1F;">${diff.divergence_point}</code>
                               <span style="color:rgba(0,0,0,0.5);margin-left:8px;">— first node where output_hash differs</span>
                           </div>`
                        : `<div style="padding:10px 12px;background:#34C75911;border:1px solid #34C75922;border-radius:6px;font-size:12px;color:rgba(0,0,0,0.6);">
                               No divergence detected — all shared nodes produced identical output hashes.
                           </div>`;

                    detail.innerHTML = `
                        <!-- Title bar -->
                        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
                            <h3 style="margin:0;font-size:14px;color:#1D1D1F;">Run Diff</h3>
                            <span style="font-size:11px;color:rgba(0,0,0,0.4);font-family:monospace;">${a.run_id.slice(0,8)}… vs ${b.run_id.slice(0,8)}…</span>
                            <button id="jnl-diff-close" style="margin-left:auto;padding:3px 10px;background:transparent;color:rgba(0,0,0,0.5);border:1px solid rgba(0,0,0,0.15);border-radius:4px;cursor:pointer;font-size:11px;">✕ Close</button>
                        </div>

                        <!-- Summary cards -->
                        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px;">
                            <div style="padding:10px;background:#F5F5F7;border-radius:8px;">
                                <div style="font-size:10px;color:rgba(0,0,0,0.4);margin-bottom:4px;">Run A</div>
                                <div style="font-size:11px;font-family:monospace;color:#1D1D1F;">${a.run_id.slice(0,8)}…</div>
                                <div style="font-size:11px;color:rgba(0,0,0,0.5);">${fmtCost(a.total_cost_usd)} · ${fmtMs(a.total_latency_ms)}</div>
                            </div>
                            <div style="padding:10px;background:#F5F5F7;border-radius:8px;">
                                <div style="font-size:10px;color:rgba(0,0,0,0.4);margin-bottom:4px;">Run B</div>
                                <div style="font-size:11px;font-family:monospace;color:#1D1D1F;">${b.run_id.slice(0,8)}…</div>
                                <div style="font-size:11px;color:rgba(0,0,0,0.5);">${fmtCost(b.total_cost_usd)} · ${fmtMs(b.total_latency_ms)}</div>
                            </div>
                            <div style="padding:10px;background:#F5F5F7;border-radius:8px;">
                                <div style="font-size:10px;color:rgba(0,0,0,0.4);margin-bottom:4px;">Cost Delta (B−A)</div>
                                <div style="font-size:16px;font-weight:600;color:${costColor};">${deltaSign(diff.cost_delta)}${fmtCost(Math.abs(diff.cost_delta))}</div>
                            </div>
                            <div style="padding:10px;background:#F5F5F7;border-radius:8px;">
                                <div style="font-size:10px;color:rgba(0,0,0,0.4);margin-bottom:4px;">Latency Delta (B−A)</div>
                                <div style="font-size:16px;font-weight:600;color:${latColor};">${deltaSign(diff.latency_delta)}${fmtMs(diff.latency_delta)}</div>
                            </div>
                        </div>

                        <!-- Output divergence -->
                        <div style="margin-bottom:14px;">
                            <div style="font-size:12px;font-weight:600;color:#1D1D1F;margin-bottom:6px;">Output Divergence</div>
                            ${divergenceHTML}
                        </div>

                        <!-- Flow topology diff -->
                        <div style="margin-bottom:14px;">
                            <div style="font-size:12px;font-weight:600;color:#1D1D1F;margin-bottom:6px;">Topology Changes</div>
                            ${flowDiffHTML}
                        </div>

                        <!-- Parameter diff -->
                        <div style="margin-bottom:14px;">
                            <div style="font-size:12px;font-weight:600;color:#1D1D1F;margin-bottom:6px;">Parameter Changes</div>
                            ${paramDiffHTML}
                        </div>
                    `;

                    detail.querySelector('#jnl-diff-close')?.addEventListener('click', () => {
                        detail.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:rgba(0,0,0,0.3);font-size:13px;">Select a run to view details</div>';
                    });
                } catch(e) {
                    detail.innerHTML = `<div style="color:#FF3B30;font-size:12px;">Diff Error: ${e.message}</div>`;
                }
            }

            diffBtn.addEventListener('click', () => {
                if (selectedRunIds.length === 2) showDiff(selectedRunIds[0], selectedRunIds[1]);
            });

            body.querySelector('#hist-refresh').addEventListener('click', () => {
                selectedRunIds = [];
                updateDiffBtn();
                loadRuns();
                loadStats();
            });

            updateDiffBtn();
            loadStats();
            loadRuns();
        }

        // --- Evaluation App (Phase 2) ---
        function openEvalApp() {
            const win = createWindow('Evaluation', 'eval', 900, 560);
            win.innerHTML = `
                <div style="display:flex;flex-direction:column;height:100%;background:#F0F2F5;color:#1D1D1F;">
                    <!-- Header -->
                    <div style="padding:12px 16px;background:#FFF;border-bottom:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;gap:10px;">
                        <h3 style="margin:0;font-size:14px;font-weight:600;">Evaluation</h3>
                        <span style="font-size:12px;color:rgba(0,0,0,0.4);">Scored runs</span>
                        <!-- Filter tabs -->
                        <div style="display:flex;gap:4px;margin-left:auto;">
                            <button class="eval-tab" data-filter="all"    style="padding:4px 12px;border-radius:5px;border:1px solid rgba(0,0,0,0.12);background:#1D1D1F;color:#FFF;cursor:pointer;font-size:11px;font-weight:600;">All</button>
                            <button class="eval-tab" data-filter="passed" style="padding:4px 12px;border-radius:5px;border:1px solid rgba(0,0,0,0.12);background:transparent;color:#1D1D1F;cursor:pointer;font-size:11px;">Passed</button>
                            <button class="eval-tab" data-filter="failed" style="padding:4px 12px;border-radius:5px;border:1px solid rgba(0,0,0,0.12);background:transparent;color:#1D1D1F;cursor:pointer;font-size:11px;">Failed</button>
                        </div>
                    </div>
                    <!-- Table header -->
                    <div style="display:grid;grid-template-columns:90px 1fr 120px 70px 60px 70px;gap:0;padding:6px 16px;background:#FAFAFA;border-bottom:1px solid rgba(0,0,0,0.06);font-size:10px;color:rgba(0,0,0,0.4);font-weight:600;">
                        <div>RUN ID</div><div>GOAL</div><div>SCORE</div><div>STATUS</div><div>COST</div><div>DATE</div>
                    </div>
                    <!-- Rows -->
                    <div id="eval-list" style="flex:1;overflow-y:auto;"></div>
                </div>
            `;

            const listEl = win.querySelector('#eval-list');
            let allRuns = [];
            let currentFilter = 'all';

            function fmtCostE(v) { return (!v || v === 0) ? '$0.00' : (v < 0.001 ? `$${(v*1000).toFixed(4)}m` : `$${v.toFixed(4)}`); }
            function fmtDateE(ts) { return ts ? new Date(ts).toLocaleDateString() : '—'; }

            function renderList(runs) {
                if (!runs.length) {
                    listEl.innerHTML = '<div style="padding:24px;color:rgba(0,0,0,0.4);font-size:12px;text-align:center;">No scored runs. Set a Goal in AI Flow and run a graph.</div>';
                    return;
                }
                listEl.innerHTML = runs.map(r => {
                    const score = r.outcome_score;
                    const pct   = score ? score.finalScore.toFixed(1) : '—';
                    const passColor = score ? (score.passed ? '#34C759' : '#FF3B30') : '#888';
                    const passLabel = score ? (score.passed ? 'PASS' : 'FAIL') : '—';
                    const barW  = score ? Math.round(score.finalScore) : 0;
                    return `<div class="eval-row" data-id="${r.run_id}" style="display:grid;grid-template-columns:90px 1fr 120px 70px 60px 70px;gap:0;padding:8px 16px;border-bottom:1px solid rgba(0,0,0,0.04);cursor:pointer;align-items:center;font-size:11px;background:#FFF;" onmouseenter="this.style.background='rgba(0,122,255,0.05)'" onmouseleave="this.style.background='#FFF'">
                        <div style="font-family:monospace;color:rgba(0,0,0,0.5);">${r.run_id.slice(0,8)}…</div>
                        <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1D1D1F;">${score?.goal_id || '—'}</div>
                        <div>
                            <div style="display:flex;align-items:center;gap:6px;">
                                <div style="flex:1;height:6px;background:rgba(0,0,0,0.07);border-radius:3px;overflow:hidden;">
                                    <div style="height:100%;width:${barW}%;background:${passColor};border-radius:3px;"></div>
                                </div>
                                <span style="font-size:10px;color:rgba(0,0,0,0.5);min-width:28px;">${pct}</span>
                            </div>
                        </div>
                        <div><span style="padding:2px 6px;background:${passColor}22;color:${passColor};border-radius:4px;font-size:10px;font-weight:600;">${passLabel}</span></div>
                        <div style="color:rgba(0,0,0,0.5);">${fmtCostE(r.total_cost_usd)}</div>
                        <div style="color:rgba(0,0,0,0.4);font-size:10px;">${fmtDateE(r.timestamp)}</div>
                    </div>`;
                }).join('');

                listEl.querySelectorAll('.eval-row').forEach(row => {
                    row.addEventListener('click', () => {
                        // Open or reuse a History window to show detail
                        openHistoryApp();
                    });
                });
            }

            async function loadEval() {
                listEl.innerHTML = '<div style="padding:20px;color:rgba(0,0,0,0.4);font-size:12px;">Loading…</div>';
                try {
                    allRuns = await journalListRuns();
                    applyFilter();
                } catch(e) {
                    listEl.innerHTML = `<div style="padding:20px;color:#FF3B30;font-size:12px;">Error: ${e.message}</div>`;
                }
            }

            function applyFilter() {
                let filtered = allRuns;
                if (currentFilter === 'passed') filtered = allRuns.filter(r => r.outcome_score?.passed === true);
                if (currentFilter === 'failed') filtered = allRuns.filter(r => r.outcome_score && r.outcome_score.passed === false);
                // Show only scored runs unless 'all'
                if (currentFilter !== 'all') {
                    renderList(filtered);
                } else {
                    renderList(allRuns.filter(r => r.outcome_score));
                }
            }

            win.querySelectorAll('.eval-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentFilter = tab.dataset.filter;
                    win.querySelectorAll('.eval-tab').forEach(t => {
                        t.style.background = t === tab ? '#1D1D1F' : 'transparent';
                        t.style.color = t === tab ? '#FFF' : '#1D1D1F';
                    });
                    applyFilter();
                });
            });

            loadEval();
        }

        // --- macOS Dock Magnification ---
        (function initDockMagnification() {
            const dock = document.getElementById('taskbar');
            const BASE = 48, MAX = 64, RADIUS = 80;

            function update(mouseX) {
                dock.querySelectorAll('.taskbar-item').forEach(item => {
                    const cx = item.getBoundingClientRect().left + item.offsetWidth / 2;
                    const d = Math.abs(mouseX - cx);
                    const scale = d < RADIUS
                        ? 1 + ((MAX - BASE) / BASE) * Math.pow(1 - d / RADIUS, 1.5)
                        : 1;
                    const icon = item.querySelector('.taskbar-icon');
                    if (icon) {
                        icon.style.transform = `scale(${scale.toFixed(3)})`;
                        icon.style.transformOrigin = 'bottom center';
                    }
                });
            }

            dock.addEventListener('mousemove', e => update(e.clientX));
            dock.addEventListener('mouseleave', () =>
                dock.querySelectorAll('.taskbar-icon').forEach(i => i.style.transform = 'scale(1)'));
        })();

    </script>
</body>
